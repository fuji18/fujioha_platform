<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-label="絶対色感 — ほぼ同じ色のタイルが並び、1枚だけ色が違う">
  <defs>
    <radialGradient id="cs-bg" cx="50%" cy="18%" r="90%">
      <stop offset="0%" stop-color="#241a2e"/>
      <stop offset="55%" stop-color="#161020"/>
      <stop offset="100%" stop-color="#0f0a16"/>
    </radialGradient>
    <radialGradient id="cs-vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </radialGradient>
    <filter id="cs-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <rect width="640" height="640" fill="url(#cs-bg)"/>

  <!-- お題グリッド: 全タイル #c79ad6、1枚だけ色相を約14°ずらす（答えのハイライトなし） -->
  <g filter="url(#cs-soft)">
    <!-- row 0 -->
    <rect x="100" y="100" width="98" height="98" rx="18" fill="#c79ad6"/>
    <rect x="214" y="100" width="98" height="98" rx="18" fill="#c79ad6"/>
    <rect x="328" y="100" width="98" height="98" rx="18" fill="#c79ad6"/>
    <rect x="442" y="100" width="98" height="98" rx="18" fill="#c79ad6"/>
    <!-- row 1 -->
    <rect x="100" y="214" width="98" height="98" rx="18" fill="#c79ad6"/>
    <rect x="214" y="214" width="98" height="98" rx="18" fill="#c79ad6"/>
    <rect x="328" y="214" width="98" height="98" rx="18" fill="#c79ad6"/>
    <rect x="442" y="214" width="98" height="98" rx="18" fill="#c79ad6"/>
    <!-- row 2 -->
    <rect x="100" y="328" width="98" height="98" rx="18" fill="#c79ad6"/>
    <rect x="214" y="328" width="98" height="98" rx="18" fill="#b39bd8"/>
    <rect x="328" y="328" width="98" height="98" rx="18" fill="#c79ad6"/>
    <rect x="442" y="328" width="98" height="98" rx="18" fill="#c79ad6"/>
    <!-- row 3 -->
    <rect x="100" y="442" width="98" height="98" rx="18" fill="#c79ad6"/>
    <rect x="214" y="442" width="98" height="98" rx="18" fill="#c79ad6"/>
    <rect x="328" y="442" width="98" height="98" rx="18" fill="#c79ad6"/>
    <rect x="442" y="442" width="98" height="98" rx="18" fill="#c79ad6"/>
  </g>

  <rect width="640" height="640" fill="url(#cs-vignette)"/>
</svg>
