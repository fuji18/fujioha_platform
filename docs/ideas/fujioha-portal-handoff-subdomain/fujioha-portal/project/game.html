<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Web ゲーム — game.fujioha.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --accent:#e8a23d;          /* arcade amber */
      --bg:#13111a;
      --bg-2:#1b1825;
      --panel:#1e1b29;
      --panel-2:#252134;
      --ink:#f3eee4;
      --ink-soft:#cfc8ba;
      --mute:#9a9387;
      --faint:#67617a;
      --rule:#2c2838;
      --jp:'Shippori Mincho B1','Hiragino Mincho ProN','Yu Mincho',serif;
      --jp-sans:'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN',sans-serif;
      --en:'Newsreader','Source Serif Pro',Georgia,serif;
      --en-body:'Zen Kaku Gothic New',system-ui,sans-serif;
      --mono:'JetBrains Mono',ui-monospace,monospace;
      --maxw:1180px;
    }
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
      font-family:var(--en-body);font-size:16px;line-height:1.65;
      -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    a{color:inherit;text-decoration:none}
    button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}

    .fp-jp{font-family:var(--jp-sans);font-feature-settings:"palt"}
    .fp-en{font-family:var(--en-body)}
    .fp-mono{font-family:var(--mono);letter-spacing:.01em}
    .fp-mute{color:var(--mute)}
    .fp-faint{color:var(--faint)}
    .pc-arrow{transition:transform .2s;display:inline-block}
    .lang-jp .fp-en{display:none !important}
    .lang-en .fp-jp{display:none !important}

    /* ── Chrome (dark variant) ────────────────────────────── */
    .pc-top{border-bottom:1px solid var(--rule);position:sticky;top:0;z-index:50;
      background:color-mix(in oklch,var(--bg) 84%,transparent);backdrop-filter:blur(10px)}
    .pc-top-inner{max-width:var(--maxw);margin:0 auto;padding:16px 48px;
      display:flex;justify-content:space-between;align-items:center}
    .pc-crumb{display:flex;align-items:center;gap:12px;font-size:13px}
    .pc-crumb-root{display:inline-flex;align-items:center;gap:8px;opacity:.7;transition:opacity .15s}
    .pc-crumb-root:hover{opacity:1}
    .pc-mark-dot{width:12px;height:12px;border-radius:50%;background:var(--accent);
      box-shadow:0 0 0 3px color-mix(in oklch,var(--accent) 22%,transparent)}
    .pc-mark-name{font-family:var(--en);font-weight:600;font-size:16px}
    .pc-crumb-sep{color:var(--faint)}
    .pc-crumb-here{display:inline-flex;align-items:center;gap:10px}
    .pc-crumb-here .pc-mono{font-size:12.5px;color:var(--mute)}
    .pc-crumb-jp{font-size:13.5px}
    .pc-link{font-size:13px;color:var(--ink-soft);border-bottom:1px solid transparent;
      padding-bottom:1px;transition:color .15s,border-color .15s}
    .pc-link:hover{color:var(--accent);border-color:var(--accent)}

    .pc-footer{border-top:1px solid var(--rule);margin-top:40px;background:var(--bg-2)}
    .pc-footer-inner{max-width:var(--maxw);margin:0 auto;padding:48px 48px 56px}
    .pc-footer-eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;
      color:var(--mute);margin-bottom:18px;grid-column:1/-1}
    .pc-footer-cross{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .pc-cross-card{border:1px solid var(--rule);border-radius:6px;padding:22px 24px;
      background:var(--panel);transition:transform .2s,border-color .2s;
      display:flex;flex-direction:column;gap:4px}
    .pc-cross-card:hover{transform:translateY(-2px);border-color:var(--accent)}
    .pc-cross-sub{font-size:12px;color:var(--mute)}
    .pc-cross-jp{font-family:var(--jp);font-weight:500;font-size:20px;margin-top:2px}
    .pc-cross-en{font-family:var(--en);font-style:italic;font-size:13.5px}
    .pc-cross-go{margin-top:12px;display:flex;align-items:center;gap:8px;
      font-size:13px;color:var(--accent);font-weight:500}
    .pc-cross-card:hover .pc-arrow{transform:translateX(4px)}
    .pc-footer-base{display:flex;justify-content:space-between;align-items:center;
      margin-top:36px;padding-top:24px;border-top:1px solid var(--rule)}
    .pc-footer-mark{display:flex;align-items:center;gap:10px}
    .pc-footer-sub{font-size:12px}
    .pc-footer-meta{font-size:11.5px}

    /* ── Game page (gm-) ──────────────────────────────────── */
    .gm{min-height:100vh;background:
      radial-gradient(ellipse at 70% -5%, #241f33 0%, transparent 55%),
      var(--bg)}
    .gm-section{max-width:var(--maxw);margin:0 auto;padding:60px 48px}
    .gm-eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);
      margin-bottom:14px}
    .gm-head{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;
      padding-bottom:24px;border-bottom:1px solid var(--rule);margin-bottom:32px;flex-wrap:wrap}
    .gm-h2{font-family:var(--jp);font-weight:500;font-size:30px;line-height:1.3;margin:0}
    .gm-h2-en{font-family:var(--en);font-style:italic;font-size:16px;margin:6px 0 0}

    /* Hero */
    .gm-hero{position:relative;overflow:hidden;border-bottom:1px solid var(--rule)}
    .gm-hero-grid{position:absolute;inset:0;z-index:0;opacity:.5}
    .gm-hero-grid::after{content:"";position:absolute;inset:0;
      background:linear-gradient(95deg, var(--bg) 12%, color-mix(in oklch,var(--bg) 70%,transparent) 48%, transparent 80%)}
    .gm-hero-inner{position:relative;z-index:1;max-width:var(--maxw);margin:0 auto;padding:92px 48px 80px}
    .gm-title{display:flex;flex-direction:column;gap:2px;margin:6px 0 0}
    .gm-title-jp{font-family:var(--jp);font-weight:500;font-size:34px;color:var(--ink-soft);letter-spacing:.04em}
    .gm-title-en{font-family:var(--en);font-weight:600;font-size:76px;line-height:1.0;
      letter-spacing:-.01em;color:var(--ink);
      text-shadow:0 0 30px color-mix(in oklch,var(--accent) 30%,transparent)}
    .gm-lede{max-width:480px;margin:24px 0 0;font-size:15px;line-height:1.8;color:var(--ink-soft)}
    .gm-lede .fp-en{display:block;margin-top:6px;font-size:13.5px}
    .gm-hero-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:28px}
    .gm-chip{font-size:11.5px;padding:6px 12px;border:1px solid var(--rule);border-radius:999px;
      background:var(--panel);color:var(--ink-soft)}

    /* Featured */
    .gm-feature{display:grid;grid-template-columns:1fr 1.1fr;border:1px solid var(--rule);
      border-radius:8px;overflow:hidden;background:var(--panel)}
    .gm-feature-art{position:relative;min-height:420px;display:flex;align-items:center;justify-content:center;
      background:
        radial-gradient(circle at 50% 40%, color-mix(in oklch,var(--hue) 35%,transparent) 0%, transparent 60%),
        linear-gradient(160deg,#1a1726 0%,#0f0d16 100%);
      overflow:hidden}
    .gm-feature-glyph{position:absolute;font-family:var(--jp);font-weight:600;font-size:280px;
      color:var(--hue);opacity:.14;line-height:1;user-select:none}
    .gm-feature-blocks{position:relative;width:200px;height:200px;
      filter:drop-shadow(0 8px 24px rgba(0,0,0,.4))}
    .gm-feature-body{padding:44px 46px;display:flex;flex-direction:column;gap:10px}
    .gm-feature-tag{align-self:flex-start;font-family:var(--mono);font-size:11px;font-weight:700;
      letter-spacing:.12em;color:var(--bg);background:var(--accent);padding:4px 10px;border-radius:3px}
    .gm-feature-jp{font-family:var(--en);font-weight:600;font-size:40px;line-height:1.05;margin:8px 0 0;
      letter-spacing:-.01em}
    .gm-feature-sub{font-family:var(--jp);font-size:18px;color:var(--ink-soft);margin:0}
    .gm-feature-en{font-family:var(--en);font-style:italic;font-size:16px;color:var(--mute);margin:2px 0 0}
    .gm-feature-desc{font-size:14px;line-height:1.8;color:var(--ink-soft);margin:10px 0 0}
    .gm-feature-desc .fp-en{display:block;margin-top:8px;font-size:12.5px}
    .gm-spec{display:flex;gap:28px;margin:20px 0 0;padding:18px 0;
      border-top:1px solid var(--rule);border-bottom:1px solid var(--rule)}
    .gm-spec-item{display:flex;flex-direction:column;gap:4px}
    .gm-spec-label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint)}
    .gm-spec-value{font-size:14px;color:var(--ink)}
    .gm-play{margin-top:22px;align-self:flex-start;display:inline-flex;align-items:center;gap:10px;
      padding:14px 28px;border-radius:6px;background:var(--accent);color:#1a1410;font-weight:700;
      font-size:15px;font-family:var(--jp-sans);transition:transform .15s,box-shadow .15s;
      white-space:nowrap;
      box-shadow:0 6px 20px -8px color-mix(in oklch,var(--accent) 70%,transparent)}
    .gm-play:hover{transform:translateY(-2px);box-shadow:0 12px 28px -8px color-mix(in oklch,var(--accent) 80%,transparent)}
    .gm-play .fp-en{font-family:var(--en);font-style:italic;font-weight:400;font-size:13px;opacity:.75}
    .gm-play-icon{font-size:12px}

    /* Shelf grid */
    .gm-filters{display:flex;flex-wrap:wrap;gap:8px}
    .gm-filter{font-size:11.5px;padding:6px 13px;border:1px solid var(--rule);border-radius:999px;
      color:var(--mute);font-family:var(--jp-sans);transition:all .15s}
    .gm-filter:hover{border-color:var(--accent);color:var(--ink)}
    .gm-filter.is-on{background:var(--accent);color:#1a1410;border-color:var(--accent);font-weight:500}

    .gm-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
    .gm-card{border:1px solid var(--rule);border-radius:8px;overflow:hidden;background:var(--panel);
      display:flex;flex-direction:column;transition:transform .2s,border-color .2s,box-shadow .2s}
    .gm-card:hover{transform:translateY(-3px);border-color:var(--accent);
      box-shadow:0 18px 40px -22px rgba(0,0,0,.7)}
    .gm-card-art{position:relative;height:148px;display:flex;align-items:center;justify-content:center;
      background:
        radial-gradient(circle at 50% 45%, color-mix(in oklch,var(--hue) 28%,transparent) 0%, transparent 62%),
        linear-gradient(160deg,#1d1a28 0%,#13111b 100%);
      border-bottom:1px solid var(--rule)}
    .gm-icon-glyph{font-family:var(--jp);font-weight:600;font-size:74px;line-height:1}
    .gm-icon-svg{width:88px;height:88px}
    .gm-card-flag{position:absolute;top:10px;right:10px;font-family:var(--mono);font-size:9.5px;
      font-weight:700;letter-spacing:.1em;padding:3px 7px;border-radius:3px}
    .gm-flag-new{background:var(--accent);color:#1a1410}
    .gm-flag-wip{background:var(--panel-2);color:var(--mute);border:1px solid var(--rule)}
    .gm-card-body{padding:18px 20px 20px;display:flex;flex-direction:column;gap:5px;flex:1}
    .gm-card-jp{font-family:var(--jp);font-weight:500;font-size:18px;line-height:1.35;margin:0}
    .gm-card-en{font-family:var(--en);font-style:italic;font-size:12.5px;margin:0}
    .gm-card-foot{display:flex;justify-content:space-between;align-items:baseline;margin-top:8px;
      padding-top:10px;border-top:1px dashed var(--rule);font-size:11.5px}
    .gm-card-genre .fp-jp{color:var(--ink-soft)}
    .gm-card-play{margin-top:14px;display:inline-flex;align-items:center;gap:8px;
      color:var(--accent);font-weight:500;font-size:13px;font-family:var(--jp-sans)}
    .gm-card-play .gm-play-icon{font-size:10px}
    .gm-card-play .fp-en{font-family:var(--en);font-style:italic;font-weight:400}

    /* Note */
    .gm-note-card{border:1px solid var(--rule);border-radius:8px;padding:36px 40px;
      background:linear-gradient(160deg,var(--panel) 0%,var(--bg-2) 100%);max-width:820px}
    .gm-note-text{font-size:15px;line-height:1.85;color:var(--ink-soft);margin:8px 0 0}
    .gm-note-text .fp-en{display:block;margin-top:10px;font-size:13.5px}
    .gm-note-sign{font-size:12.5px;margin-top:14px}

    @media (max-width:900px){
      .gm-title-en{font-size:50px}
      .gm-feature{grid-template-columns:1fr}
      .gm-feature-art{min-height:240px}
      .gm-feature-glyph{font-size:180px}
      .gm-grid{grid-template-columns:1fr 1fr}
    }
    @media (max-width:560px){
      .gm-grid{grid-template-columns:1fr}
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="portal-chrome.jsx"></script>
  <script type="text/babel" src="game.jsx"></script>
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(<GamePage />);
  </script>
</body>
</html>
